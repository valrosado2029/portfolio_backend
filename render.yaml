services:
  - type: web
    name: portfolio-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_USERNAME
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: BACKEND_API_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
